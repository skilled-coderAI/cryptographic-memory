name: Bug report
description: Report a reproducible problem in cryptomem.
title: "fix: <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please **do not** report security vulnerabilities here — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps or code/commands to reproduce.
      placeholder: |
        1. cryptomem serve --mode sqlite ...
        2. call /cmem/v1/...
        3. observe ...
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Python engine (cryptomem)
        - Sidecar / REST API
        - Rust client (cryptomem-rs)
        - Docs
        - Other / not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: cryptomem version (or commit)
      placeholder: "0.1.0 or git sha"
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python and/or Rust version, Ollama version & model, RAM.
      placeholder: |
        OS: Windows 11
        Python: 3.12
        Rust: 1.79
        Ollama: 0.x, model qwen2.5:0.5b
        RAM: 8 GB
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      render: shell
