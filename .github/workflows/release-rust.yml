name: Release Rust

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Rust project exists
        run: |
          test -f Cargo.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build release binary
        run: cargo build --release --locked

      - name: Determine binary name
        id: binary
        run: |
          BIN_NAME=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].targets[] | select(.kind[]=="bin") | .name' | head -n1)

          if [ -z "$BIN_NAME" ]; then
            echo "No binary target found"
            exit 1
          fi

          echo "name=$BIN_NAME" >> "$GITHUB_OUTPUT"

      - name: Create release archive
        run: |
          mkdir release

          cp target/release/${{ steps.binary.outputs.name }} release/

          cd release

          tar -czf \
            ../${{ steps.binary.outputs.name }}-linux-x86_64.tar.gz \
            ${{ steps.binary.outputs.name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            rust/${{ steps.binary.outputs.name }}-linux-x86_64.tar.gz