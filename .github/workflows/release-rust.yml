# --------------------------------------------------------------
# Release Rust – builds a binary on every version tag,
# but only if a Cargo.toml file exists in the repository.
# --------------------------------------------------------------
name: Release Rust

on:
  push:
    tags:
      - "v*"   # matches tags like v1.2.3, v0.9.0‑rc, etc.

jobs:
  build-and-release:
    # ← expression wrapped in ${{ … }}
    if: ${{ hashFiles('rust/Cargo.toml') != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Build release binary
        run: |
          cd rust
          cargo build --release

      # --------------------------------------------------
      # OPTIONAL – create a GitHub Release and upload the binary.
      # --------------------------------------------------
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: rust/target/release/cryptomem-rs   # ← replace with the actual binary name
