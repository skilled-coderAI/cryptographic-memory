name: release-rust

# release-plz derives versions from Conventional Commits, updates the changelog,
# opens release PRs, tags, and runs `cargo publish` for workspace members.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    runs-on: ubuntu-latest
    # Activates once the rust/ workspace exists.
    if: ${{ hashFiles('rust/Cargo.toml') != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0
        with:
          manifest_path: rust/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
