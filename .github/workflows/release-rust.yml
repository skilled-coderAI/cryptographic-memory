# --------------------------------------------------------------
# Release Rust – builds a binary on every version tag, but only
# if the repository actually contains a Cargo.toml file.
# --------------------------------------------------------------
name: Release Rust

on:
  push:
    tags:
      - "v*"   # matches v1.2.3, v0.9.0‑rc, etc.

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    # <<< fixed – hashFiles now inside ${{ … }} >>>
    if: ${{ hashFiles('rust/Cargo.toml') != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Build release binary
        run: |
          cd rust
          cargo build --release

      # --------------------------------------------------
      # OPTIONAL – create a GitHub Release and upload the binary.
      # --------------------------------------------------
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: rust/target/release/cryptomem-rs   # <-- replace with the real binary name
