# --------------------------------------------------------------
# Release workflow – builds and publishes a Rust binary when a
# tag (v*) is pushed, *but only if the repository actually
# contains a Rust Cargo.toml*.
# --------------------------------------------------------------
name: Release Rust

on:
  push:
    tags:
      - "v*"   # e.g. v1.2.3

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    # <-- Fixed: hashFiles is now inside ${{ … }}
    if: ${{ hashFiles('rust/Cargo.toml') != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Build release binary
        run: |
          cd rust
          cargo build --release

      # ------------------------------------------------------
      # OPTIONAL – create a GitHub release and upload the binary.
      # ------------------------------------------------------
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: rust/target/release/cryptomem-rs
