# --------------------------------------------------------------
# Release – auto-derives the next semver version, then builds the
# Rust crate and the Python package IN PARALLEL and attaches both
# to a single GitHub Release. The Python package is also pushed to
# PyPI.
#
# IMPORTANT: `main` is a protected branch (PR-only, signed commits,
# merge queue), so this workflow NEVER pushes a commit to main.
# The version is computed from the latest git TAG, injected into
# the build at build-time (not committed), and the new tag + Release
# are created via the GitHub API by softprops/action-gh-release.
#
# Trigger: every push to main (auto patch bump) or a manual run
# from the Actions tab.
# --------------------------------------------------------------
name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

# Never run two releases for the same ref at once (a half-published
# release with only one artifact is worse than waiting).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------
  # Compute the next semver from the latest `vX.Y.Z` tag (patch+1).
  # No commit, no branch push -> works with protected `main`.
  # First ever run (no tags) falls back to pyproject.toml's version.
  # ----------------------------------------------------------
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.next.outputs.version }}
      tag: ${{ steps.next.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: next
        run: |
          set -euo pipefail
          # Only consider strict semver tags (vX.Y.Z, no leading zeros,
          # no suffix). This deliberately ignores legacy date-based tags
          # such as v2026.06.02-58 which are not valid semver.
          semver='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'
          latest=$(git tag -l | { grep -E "${semver}" || true; } | sort -V | tail -n1)

          if [ -z "${latest}" ]; then
            new=$(grep -oP '^version = "\K[0-9]+\.[0-9]+\.[0-9]+' python/pyproject.toml)
            echo "No semver tags; starting from pyproject version ${new}"
          else
            cur=${latest#v}
            IFS='.' read -r major minor patch <<< "${cur}"
            new="${major}.${minor}.$((10#${patch} + 1))"
            echo "Latest semver tag ${latest} -> next ${new}"
          fi

          # Guard against a tag that somehow already exists.
          while git rev-parse "v${new}" >/dev/null 2>&1; do
            IFS='.' read -r major minor patch <<< "${new}"
            new="${major}.${minor}.$((10#${patch} + 1))"
          done

          echo "Releasing version ${new}"
          {
            echo "version=${new}"
            echo "tag=v${new}"
          } >> "$GITHUB_OUTPUT"

  # ----------------------------------------------------------
  # Rust – the crate is a LIBRARY (no executable), so the
  # distributable is the packaged `.crate` file, not a binary.
  # ----------------------------------------------------------
  build-rust:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Inject release version
        run: |
          set -euo pipefail
          v="${{ needs.version.outputs.version }}"
          sed -i -E "0,/^version = \"[0-9]+\.[0-9]+\.[0-9]+\"/s//version = \"${v}\"/" rust/cryptomem-rs/Cargo.toml

      - name: Build release library
        run: cargo build --release --manifest-path rust/Cargo.toml

      - name: Package crate
        run: cargo package -p cryptomem-rs --manifest-path rust/Cargo.toml --allow-dirty

      - name: Upload Rust artifact
        uses: actions/upload-artifact@v7
        with:
          name: rust-crate
          path: rust/target/package/*.crate
          if-no-files-found: error

  # ----------------------------------------------------------
  # Python – pure-Python package: build sdist (.tar.gz) + wheel (.whl).
  # The computed version is injected into the sources at build-time
  # only (it is never committed back to the repo).
  # ----------------------------------------------------------
  build-python:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Inject release version
        run: |
          set -euo pipefail
          v="${{ needs.version.outputs.version }}"
          sed -i -E "s/^version = \"[0-9]+\.[0-9]+\.[0-9]+\"/version = \"${v}\"/" python/pyproject.toml
          sed -i -E "s/^__version__ = \"[0-9]+\.[0-9]+\.[0-9]+\"/__version__ = \"${v}\"/" python/cryptomem/__init__.py

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build python/

      - name: Upload Python artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: python/dist/*
          if-no-files-found: error

  # ----------------------------------------------------------
  # Publish – waits for BOTH builds, then creates the tag + Release
  # via the GitHub API (no git push to a protected branch) and
  # attaches every artifact.
  # ----------------------------------------------------------
  release:
    needs: [version, build-rust, build-python]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/rust-crate/*
            artifacts/python-dist/*

  # ----------------------------------------------------------
  # PyPI – upload the wheel + sdist with an API token.
  # `--skip-existing` is a safety net; versions are unique per run.
  #
  # Requires repo secret: PYPI_API_TOKEN (the full `pypi-...` token).
  # ----------------------------------------------------------
  publish-pypi:
    needs: build-python
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Python artifact
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade twine
          twine upload --non-interactive --skip-existing dist/*

  # ----------------------------------------------------------
  # crates.io – publish cryptomem-rs. crates.io rejects duplicate
  # versions, so the same computed semver is injected first. If the
  # version is already on crates.io the publish is skipped (cargo has
  # no native --skip-existing), mirroring the PyPI job.
  #
  # Requires repo secret: CARGO_REGISTRY_TOKEN (a crates.io API token).
  # ----------------------------------------------------------
  publish-crates:
    needs: [version, build-rust]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Inject release version
        run: |
          set -euo pipefail
          v="${{ needs.version.outputs.version }}"
          sed -i -E "0,/^version = \"[0-9]+\.[0-9]+\.[0-9]+\"/s//version = \"${v}\"/" rust/cryptomem-rs/Cargo.toml

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          v="${{ needs.version.outputs.version }}"
          if curl -sfL "https://crates.io/api/v1/crates/cryptomem-rs/${v}" >/dev/null 2>&1; then
            echo "cryptomem-rs ${v} is already on crates.io; skipping."
          else
            cargo publish -p cryptomem-rs --manifest-path rust/Cargo.toml --allow-dirty
          fi
