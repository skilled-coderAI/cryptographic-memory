# --------------------------------------------------------------
# Release – auto-bumps the (semver) version, then builds the Rust
# crate and the Python package IN PARALLEL and attaches both to a
# single GitHub Release. The Python package is also pushed to PyPI.
#
# Trigger: every push to main (auto patch bump) or a manual run
# from the Actions tab. The `version` job bumps + commits the new
# version; the two `build-*` jobs then run at the same time against
# that commit; `release` waits for both and publishes once.
# --------------------------------------------------------------
name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

# Never run two releases for the same ref at once (a half-published
# release with only one artifact is worse than waiting).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------
  # Auto-bump the Python package patch version (semver) so PyPI
  # never rejects a duplicate. The bump is committed back to main
  # with [skip ci] (so it does not re-trigger this workflow), and
  # the resulting commit SHA is what every other job builds from.
  # ----------------------------------------------------------
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: bump
        run: |
          set -euo pipefail
          proj="python/pyproject.toml"
          init="python/cryptomem/__init__.py"

          current=$(grep -oP '^version = "\K[0-9]+\.[0-9]+\.[0-9]+' "$proj")
          IFS='.' read -r major minor patch <<< "$current"
          new="${major}.${minor}.$((patch + 1))"
          echo "Bumping ${current} -> ${new}"

          sed -i -E "s/^version = \"[0-9]+\.[0-9]+\.[0-9]+\"/version = \"${new}\"/" "$proj"
          sed -i -E "s/^__version__ = \"[0-9]+\.[0-9]+\.[0-9]+\"/__version__ = \"${new}\"/" "$init"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$proj" "$init"
          git commit -m "chore(release): bump version to ${new} [skip ci]"
          git push origin HEAD:main

          {
            echo "version=${new}"
            echo "tag=v${new}"
            echo "sha=$(git rev-parse HEAD)"
          } >> "$GITHUB_OUTPUT"

  # ----------------------------------------------------------
  # Rust – the crate is a LIBRARY (no executable), so the
  # distributable is the packaged `.crate` file, not a binary.
  # ----------------------------------------------------------
  build-rust:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build release library
        run: cargo build --release --locked --manifest-path rust/Cargo.toml

      - name: Package crate
        run: cargo package --locked --manifest-path rust/Cargo.toml

      - name: Upload Rust artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-crate
          path: rust/target/package/*.crate
          if-no-files-found: error

  # ----------------------------------------------------------
  # Python – pure-Python package: build sdist (.tar.gz) + wheel (.whl)
  # ----------------------------------------------------------
  build-python:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build python/

      - name: Upload Python artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/dist/*
          if-no-files-found: error

  # ----------------------------------------------------------
  # Publish – waits for BOTH builds, tags the commit, and
  # attaches every artifact to one GitHub Release.
  # ----------------------------------------------------------
  release:
    needs: [version, build-rust, build-python]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.sha }}
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.version.outputs.tag }}"
          git push origin "${{ needs.version.outputs.tag }}"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/rust-crate/*
            artifacts/python-dist/*

  # ----------------------------------------------------------
  # PyPI – upload the wheel + sdist with an API token.
  # `--skip-existing` means re-running on a version that is
  # already on PyPI is a no-op instead of a hard failure, so
  # the workflow only actually publishes when the version bumps.
  #
  # Requires repo secret: PYPI_API_TOKEN (the full `pypi-...` token).
  # ----------------------------------------------------------
  publish-pypi:
    needs: build-python
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Python artifact
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade twine
          twine upload --non-interactive --skip-existing dist/*
