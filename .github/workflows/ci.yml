# --------------------------------------------------------------
# CI – fast quality gate that runs on every push / PR to main.
# It only TESTS the code (no publishing). The Release workflow
# never runs tests, so this is the gate that stops a broken
# commit from ever being turned into a release.
#
#   * Python job – runs when python/pyproject.toml exists.
#   * Rust   job – runs when rust/Cargo.toml      exists.
# --------------------------------------------------------------
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ----------------------------------------------------------
  # Python job – only runs if python/pyproject.toml is present
  # ----------------------------------------------------------
  python:
    if: ${{ hashFiles('python/pyproject.toml') != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python package (with test deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e "python[dev,serve]"

      - name: Run Python tests
        run: pytest python/tests

  # ----------------------------------------------------------
  # Rust job – only runs if rust/Cargo.toml is present
  # ----------------------------------------------------------
  rust:
    if: ${{ hashFiles('rust/Cargo.toml') != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Cargo build
        run: cargo build --locked --verbose --manifest-path rust/Cargo.toml

      - name: Cargo test
        run: cargo test --locked --verbose --manifest-path rust/Cargo.toml
