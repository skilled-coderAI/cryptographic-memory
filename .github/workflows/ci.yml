# --------------------------------------------------------------
# CI workflow – builds the Python and Rust parts of the repo.
# --------------------------------------------------------------
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # -----------------------------------------------------------------
  # Python CI – runs only when a Python project file is present.
  # -----------------------------------------------------------------
  python:
    name: Python CI
    runs-on: ubuntu-latest
    # <-- Fixed: hashFiles is now inside ${{ … }}
    if: ${{ hashFiles('python/pyproject.toml') != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python/requirements.txt
          pip install -e python

      - name: Run Python tests
        run: |
          pytest python/tests

  # -----------------------------------------------------------------
  # Rust CI – runs only when a Cargo.toml is present.
  # -----------------------------------------------------------------
  rust:
    name: Rust CI
    runs-on: ubuntu-latest
    # <-- Fixed: hashFiles is now inside ${{ … }}
    if: ${{ hashFiles('rust/Cargo.toml') != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cargo build
        run: |
          cd rust
          cargo build --verbose

      - name: Cargo test
        run: |
          cd rust
          cargo test --verbose
