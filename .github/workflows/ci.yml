# --------------------------------------------------------------
# CI – runs Python tests when a Python project file exists,
# and Rust tests when a Cargo.toml exists.
# --------------------------------------------------------------
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ----------------------------------------------------------
  # Python job – only runs if python/pyproject.toml is present
  # ----------------------------------------------------------
  python:
    # ← expression wrapped in ${{ … }}
    if: ${{ hashFiles('python/pyproject.toml') != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r python/requirements.txt
          pip install -e python

      - name: Run Python tests
        run: pytest python/tests

  # ----------------------------------------------------------
  # Rust job – only runs if rust/Cargo.toml is present
  # ----------------------------------------------------------
  rust:
    if: ${{ hashFiles('rust/Cargo.toml') != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cargo build
        run: |
          cd rust
          cargo build --verbose

      - name: Cargo test
        run: |
          cd rust
          cargo test --verbose
