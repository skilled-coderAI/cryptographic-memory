name: release-python

# Tag the Python package release as `py-vX.Y.Z` to trigger this workflow.
on:
  push:
    tags: ["py-v*"]

permissions:
  contents: read

# Never cancel an in-flight release; overlapping publishes corrupt the index.
concurrency:
  group: release-python-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-version:
    name: verify version matches tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Tag must equal pyproject and __version__
        run: |
          tag="${GITHUB_REF_NAME#py-v}"
          proj=$(python -c "import tomllib,pathlib;print(tomllib.loads(pathlib.Path('python/pyproject.toml').read_text())['project']['version'])")
          init=$(python -c "import re,pathlib;print(re.search(r'__version__ = \"([^\"]+)\"', pathlib.Path('python/cryptomem/__init__.py').read_text()).group(1))")
          echo "tag=$tag  pyproject=$proj  __init__=$init"
          test "$tag" = "$proj" || { echo "::error::tag $tag != pyproject.toml version $proj"; exit 1; }
          test "$tag" = "$init" || { echo "::error::tag $tag != __init__.__version__ $init"; exit 1; }

  build:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build python/
      - name: Validate package metadata
        run: twine check python/dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: python/dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC -> short-lived PyPI credential (Trusted Publishing)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        # First validate on TestPyPI by setting:
        #   with:
        #     repository-url: https://test.pypi.org/legacy/

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release and attach the built artifacts
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
