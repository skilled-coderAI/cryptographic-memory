<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="cryptomem - cryptographically verified memory for AI agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="0.55" stop-color="#111A36"/>
      <stop offset="1" stop-color="#1B2350"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C5CFF"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#A9B4FF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="20" fill="url(#bg)"/>

  <!-- subtle node-graph motif -->
  <g opacity="0.25" stroke="url(#accent)" stroke-width="1.5">
    <line x1="980" y1="70" x2="1080" y2="130"/>
    <line x1="1080" y1="130" x2="1010" y2="220"/>
    <line x1="1010" y1="220" x2="1130" y2="250"/>
    <line x1="1080" y1="130" x2="1190" y2="90"/>
    <line x1="980" y1="70" x2="900" y2="170"/>
    <line x1="900" y1="170" x2="1010" y2="220"/>
  </g>
  <g fill="url(#accent)">
    <circle cx="980" cy="70" r="7"/>
    <circle cx="1080" cy="130" r="9"/>
    <circle cx="1010" cy="220" r="7"/>
    <circle cx="1130" cy="250" r="6"/>
    <circle cx="1190" cy="90" r="6"/>
    <circle cx="900" cy="170" r="6"/>
  </g>

  <!-- lock + shield emblem -->
  <g transform="translate(96,110)" filter="url(#glow)">
    <path d="M70 12 L126 34 V74 C126 116 100 140 70 152 C40 140 14 116 14 74 V34 Z"
          fill="none" stroke="url(#accent)" stroke-width="5"/>
    <rect x="46" y="70" width="48" height="42" rx="8" fill="url(#accent)"/>
    <path d="M52 70 V58 a18 18 0 0 1 36 0 V70" fill="none" stroke="url(#accent)" stroke-width="6"/>
    <circle cx="70" cy="88" r="6" fill="#0B1020"/>
    <rect x="67" y="90" width="6" height="14" rx="3" fill="#0B1020"/>
  </g>

  <!-- wordmark -->
  <text x="280" y="150" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="84" font-weight="800" fill="url(#title)">cryptomem</text>
  <text x="284" y="206" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="30" font-weight="500" fill="#9FB0D6">Cryptographically verified memory for AI agents</text>

  <!-- feature pills -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="600">
    <g transform="translate(284,250)">
      <rect width="190" height="46" rx="23" fill="#7C5CFF" opacity="0.18"/>
      <text x="95" y="30" text-anchor="middle" fill="#C7B6FF">Signed &amp; verified</text>
    </g>
    <g transform="translate(490,250)">
      <rect width="170" height="46" rx="23" fill="#22D3EE" opacity="0.16"/>
      <text x="85" y="30" text-anchor="middle" fill="#9BE9F6">Local-first</text>
    </g>
    <g transform="translate(676,250)">
      <rect width="210" height="46" rx="23" fill="#34D399" opacity="0.16"/>
      <text x="105" y="30" text-anchor="middle" fill="#A7F3D0">Python &amp; Rust</text>
    </g>
    <g transform="translate(902,250)">
      <rect width="220" height="46" rx="23" fill="#F59E0B" opacity="0.16"/>
      <text x="110" y="30" text-anchor="middle" fill="#FCD9A0">Abstains, never guesses</text>
    </g>
  </g>
</svg>
