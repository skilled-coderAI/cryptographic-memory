<svg width="1280" height="260" viewBox="0 0 1280 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="cryptomem verification pipeline">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="0" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E1430"/>
      <stop offset="1" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="pacc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C5CFF"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto">
      <path d="M0 0 L10 6 L0 12 Z" fill="#22D3EE"/>
    </marker>
  </defs>
  <rect width="1280" height="260" rx="18" fill="url(#pbg)"/>
  <text x="40" y="48" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#E6ECFF">How a fact becomes a trusted answer</text>

  <g font-family="Segoe UI, Helvetica, Arial, sans-serif">
    <!-- Step boxes -->
    <g transform="translate(40,90)">
      <rect width="190" height="110" rx="14" fill="#151E3F" stroke="url(#pacc)" stroke-width="2"/>
      <text x="95" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#C7B6FF">Retrieve</text>
      <text x="95" y="74" text-anchor="middle" font-size="15" fill="#9FB0D6">graph + vector</text>
      <text x="95" y="94" text-anchor="middle" font-size="15" fill="#9FB0D6">relevant nodes</text>
    </g>
    <g transform="translate(290,90)">
      <rect width="190" height="110" rx="14" fill="#151E3F" stroke="url(#pacc)" stroke-width="2"/>
      <text x="95" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#9BE9F6">Verify</text>
      <text x="95" y="74" text-anchor="middle" font-size="15" fill="#9FB0D6">SHA-256 hash</text>
      <text x="95" y="94" text-anchor="middle" font-size="15" fill="#9FB0D6">Ed25519 signature</text>
    </g>
    <g transform="translate(540,90)">
      <rect width="190" height="110" rx="14" fill="#151E3F" stroke="url(#pacc)" stroke-width="2"/>
      <text x="95" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#A7F3D0">Compress</text>
      <text x="95" y="74" text-anchor="middle" font-size="15" fill="#9FB0D6">dedupe + budget</text>
      <text x="95" y="94" text-anchor="middle" font-size="15" fill="#9FB0D6">fewer tokens</text>
    </g>
    <g transform="translate(790,90)">
      <rect width="200" height="110" rx="14" fill="#151E3F" stroke="url(#pacc)" stroke-width="2"/>
      <text x="100" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#FCD9A0">Ground</text>
      <text x="100" y="74" text-anchor="middle" font-size="15" fill="#9FB0D6">inject only</text>
      <text x="100" y="94" text-anchor="middle" font-size="15" fill="#9FB0D6">verified facts</text>
    </g>
    <g transform="translate(1050,90)">
      <rect width="190" height="110" rx="14" fill="#10261E" stroke="#34D399" stroke-width="2.5"/>
      <text x="95" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#A7F3D0">Answer</text>
      <text x="95" y="74" text-anchor="middle" font-size="15" fill="#9FB0D6">cite source</text>
      <text x="95" y="94" text-anchor="middle" font-size="15" fill="#9FB0D6">or abstain</text>
    </g>

    <!-- arrows -->
    <g stroke="#22D3EE" stroke-width="2.5">
      <line x1="232" y1="145" x2="286" y2="145" marker-end="url(#arrow)"/>
      <line x1="482" y1="145" x2="536" y2="145" marker-end="url(#arrow)"/>
      <line x1="732" y1="145" x2="786" y2="145" marker-end="url(#arrow)"/>
      <line x1="992" y1="145" x2="1046" y2="145" marker-end="url(#arrow)"/>
    </g>
  </g>

  <text x="40" y="240" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#6B7AA8">Tampered or unsigned nodes are rejected before they ever reach the model.</text>
</svg>
